server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods: 
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "PATCH"
              - "OPTIONS"
            allowedHeaders: 
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: car-service
          uri: lb://car-service
          predicates:
            - Path=/api/v1/admin/cars/**, /api/v1/admin/locations/**, /api/v1/admin/brands/**, /api/v1/public/cars/**, /api/v1/public/brands/**, /api/v1/public/locations/**

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/customers/**, /api/v1/admin/customers/**

        - id: renting-service
          uri: lb://renting-service
          predicates:
            - Path=/api/v1/rentals/**, /api/v1/admin/rentals/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notification/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/