server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: car-service
          uri: lb://car-service
          predicates:
            - Path=/api/v1/cars/**

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers/**

        - id: renting-service
          uri: lb://renting-service
          predicates:
            - Path=/api/v1/rentings/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notification/**