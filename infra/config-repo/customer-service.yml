server:
  port: 8082


spring:
  application:
    name: customer-service
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://${CUSTOMER_DB_HOST:localhost}:${CUSTOMER_DB_PORT:5432}/${CUSTOMER_DB_NAME:rental_customer_service_dbs}
    username: ${CUSTOMER_DB_USERNAME:postgres}
    password: ${CUSTOMER_DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate.format_sql: true
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/